<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DeepBindi — Model Architecture Tour</title>
<style>
:root {
  --bg:   #ffffff; --bg2:  #f5f5f0; --bg3:  #eceae4;
  --tx:   #1a1a1a; --tx2:  #555550; --tx3:  #888880;
  --bd:   rgba(0,0,0,0.12); --bd2: rgba(0,0,0,0.22);
  --rad:  8px; --rad-lg: 12px;
  --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
  --mono: "Courier New", Courier, monospace;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg:  #1c1c1e; --bg2: #2c2c2e; --bg3: #3a3a3c;
    --tx:  #f2f2f7; --tx2: #aeaeb2; --tx3: #636366;
    --bd:  rgba(255,255,255,0.12); --bd2: rgba(255,255,255,0.22);
  }
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--sans);font-size:14px;color:var(--tx);background:var(--bg);padding:24px 16px 48px}
.page{max-width:860px;margin:0 auto}
h1{font-size:20px;font-weight:500;margin-bottom:4px}
.sub{font-size:13px;color:var(--tx2);margin-bottom:20px}
.t-tabs{display:flex;border-bottom:1px solid var(--bd);margin-bottom:14px}
.t-tab{flex:1;padding:10px 6px;background:none;border:none;border-bottom:2.5px solid transparent;cursor:pointer;font-family:var(--sans);font-size:12px;font-weight:400;color:var(--tx2);transition:color .15s}
.t-tab:hover{color:var(--tx);background:var(--bg2)}
.t-tab.on{font-weight:500;color:var(--tx)}
.t-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px}
.t-stat{background:var(--bg2);border-radius:var(--rad);padding:10px 12px}
.t-stat-v{font-size:17px;font-weight:500}
.t-stat-l{font-size:11px;color:var(--tx3);margin-top:2px}
.t-nav{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.t-nav-btn{padding:5px 12px;background:none;border:1px solid var(--bd2);border-radius:var(--rad);cursor:pointer;font-size:12px;color:var(--tx2);font-family:var(--sans)}
.t-nav-btn:hover{background:var(--bg2)}
.t-nav-btn:disabled{opacity:.3;cursor:default}
.t-nav-label{flex:1;text-align:center;font-size:13px;font-weight:500;color:var(--tx)}
.t-detail{background:var(--bg);border:1px solid var(--bd);border-radius:var(--rad-lg);padding:16px;margin-bottom:14px;min-height:280px}
.t-dh{display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.t-dn{font-size:15px;font-weight:500}
.t-chip{font-size:11px;padding:2px 8px;border-radius:var(--rad);font-weight:500;white-space:nowrap}
.t-shapes{display:flex;align-items:center;gap:6px;margin-bottom:10px;flex-wrap:wrap}
.t-shape{font-family:var(--mono);font-size:12px;background:var(--bg2);padding:3px 8px;border-radius:var(--rad)}
.t-arr{color:var(--tx3);font-size:13px}
.t-el{margin-left:auto;font-size:11px;color:var(--tx3);font-family:var(--mono)}
.t-formula{background:var(--bg2);border-radius:var(--rad);padding:10px 12px;font-family:var(--mono);font-size:11px;color:var(--tx2);white-space:pre-wrap;margin-bottom:10px;line-height:1.65}
.t-metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px}
.t-metric{text-align:center;padding:8px 4px;background:var(--bg2);border-radius:var(--rad)}
.t-metric-v{font-size:14px;font-weight:500}
.t-metric-l{font-size:10px;color:var(--tx3);margin-top:2px}
.t-desc{font-size:12px;color:var(--tx2);line-height:1.6}
.t-pipe{overflow-x:auto;padding-bottom:6px;margin-bottom:14px}
.t-pipe-inner{display:flex;align-items:center;gap:3px;min-width:max-content;padding:2px}
.t-pbox{cursor:pointer;border:1.5px solid transparent;border-radius:var(--rad);padding:4px 7px;font-size:10px;font-family:var(--sans);white-space:nowrap;font-weight:400}
.t-pbox:hover{opacity:.8}
.t-pbox.sel{font-weight:500}
.t-parr{font-size:9px;color:var(--tx3)}
.t-arena-lbl{display:flex;justify-content:space-between;font-size:11px;color:var(--tx3);margin-bottom:5px}
.t-arena-lbl span:last-child{font-weight:500;color:var(--tx2)}
.t-arena-track{height:10px;background:var(--bg2);border-radius:5px;overflow:hidden}
.t-arena-fill{height:100%;border-radius:5px;transition:width .25s ease}
.t-arena-note{font-size:11px;color:var(--tx3);margin-top:4px}
footer{margin-top:32px;font-size:11px;color:var(--tx3);border-top:1px solid var(--bd);padding-top:12px}
@media(max-width:540px){
  .t-stats{grid-template-columns:repeat(2,1fr)}
  .t-metrics{grid-template-columns:repeat(2,1fr)}
  .t-el{display:none}
}
</style>
</head>

f:'out[c][0] = max(x[c][0], x[c][1])',
d:'Width 2→1. Final 64-element feature vector.'},
{name:'Flatten',t:'rsh',si:'(1,64,1,1)',so:'(64,)',el:64,w:0,ops:0,da:64,ca:1802,
f:'flat[i] = pool2[i]  (new Tensor struct, arena bump)',
d:'Shape reshape.'},
{name:'FC + threshold',t:'fc',si:'(64,)',so:'(1,)',el:1,w:65,ops:64,da:1,ca:1803,
f:'logit = Σ_{i=0}^{63} w[i] × flat[i] + b\nlabel = (logit > 0) ? 1 (FEAR) : 0 (NO_FEAR)',
d:'Same head as both other models. 65 int32 params.'},
]},
];

const TLABEL={input:'input',conv:'Conv1d',dw:'DWConv1d',pw:'PWConv1d',bn:'BN+ReLU+rshift',bnc:'BN+ReLU+rshift/ch',pool:'MaxPool1d',rsh:'flatten',fc:'Dense+thresh',se:'SE block'};

function chip(t,m){
  const s={
    input:'background:#e8e8e4;color:#555550',
    conv:`background:${m.mcb};color:${m.mct}`,dw:`background:${m.mcb};color:${m.mct}`,
    pw:`background:${m.mcb};color:${m.mct}`,fc:`background:${m.mcb};color:${m.mct}`,
    bn:'background:#EAF3DE;color:#3B6D11',bnc:'background:#EAF3DE;color:#27500A',
    pool:'background:#FAEEDA;color:#854F0B',rsh:'background:#e8e8e4;color:#555550',
    se:'background:#EEEDFE;color:#534AB7'
  };
  return s[t]||'';
}

function fmt(n){return n>=10000?(n/1000).toFixed(1)+'K':n>=1000?n.toLocaleString():String(n)}

let cm=0,cl=0;

function render(){
  const m=MODELS[cm],ly=m.layers[cl];
  const romKB=Math.round(m.rom*4/1024);

  document.getElementById('ttabs').innerHTML=MODELS.map((mod,i)=>`
    <button class="t-tab${i===cm?' on':''}"
      style="border-bottom-color:${i===cm?mod.mc:'transparent'}"
      onclick="swM(${i})">${mod.name}</button>`).join('');

  document.getElementById('tstats').innerHTML=`
    <div class="t-stat"><div class="t-stat-v" style="color:${m.mc}">${romKB} KB</div><div class="t-stat-l">ROM — weights</div></div>
    <div class="t-stat"><div class="t-stat-v" style="color:${m.mc}">${m.ram}</div><div class="t-stat-l">peak arena (words)</div></div>
    <div class="t-stat"><div class="t-stat-v" style="color:${m.mc}">${fmt(m.macs)}</div><div class="t-stat-l">total MACs</div></div>
    <div class="t-stat"><div class="t-stat-v" style="color:${m.mc}">${m.layers.length}</div><div class="t-stat-l">layers</div></div>`;

  document.getElementById('tbprev').disabled=cl===0;
  document.getElementById('tbnext').disabled=cl===m.layers.length-1;
  document.getElementById('tnlabel').textContent=`${cl+1} / ${m.layers.length}  ·  ${ly.name}`;

  const pct=Math.round(ly.ca/m.amax*100);
  document.getElementById('tdetail').innerHTML=`
    <div class="t-dh">
      <div class="t-dn">${ly.name}</div>
      <span class="t-chip" style="${chip(ly.t,m)}">${TLABEL[ly.t]||ly.t}</span>
      <span style="margin-left:auto;font-size:11px;color:var(--tx3)">layer ${cl+1} of ${m.layers.length}</span>
    </div>
    <div class="t-shapes">
      <div class="t-shape">${ly.si}</div>
      <div class="t-arr">→</div>
      <div class="t-shape">${ly.so}</div>
      <div class="t-el">${ly.el} int32 · ${ly.el*4} bytes</div>
    </div>
    <pre class="t-formula">${ly.f}</pre>
    <div class="t-metrics">
      <div class="t-metric">
        <div class="t-metric-v" style="color:${m.mc}">${ly.w>0?fmt(ly.w):'—'}</div>
        <div class="t-metric-l">weight params</div>
      </div>
      <div class="t-metric">
        <div class="t-metric-v" style="color:${m.mc}">${ly.ops>0?fmt(ly.ops):'—'}</div>
        <div class="t-metric-l">ops (MACs / adds)</div>
      </div>
      <div class="t-metric">
        <div class="t-metric-v" style="color:${m.mc}">${ly.ca} / ${m.amax}</div>
        <div class="t-metric-l">arena after (words)</div>
      </div>
    </div>
    <div class="t-desc">${ly.d}</div>`;

  document.getElementById('tpipe').innerHTML='<div class="t-pipe-inner">'+
    m.layers.map((l,i)=>`<span class="t-pbox${i===cl?' sel':''}" style="${chip(l.t,m)};${i===cl?`border-color:${m.mc};`:''}" onclick="swL(${i})">${l.name}</span>`+
    (i<m.layers.length-1?'<span class="t-parr">›</span>':'')).join('')+'</div>';

  document.getElementById('tarena').innerHTML=`
    <div class="t-arena-lbl"><span>activation arena usage after this step</span><span>${ly.ca} / ${m.amax} words (${pct}%)</span></div>
    <div class="t-arena-track"><div class="t-arena-fill" style="width:${pct}%;background:${m.mc}"></div></div>
    <div class="t-arena-note">${ly.da>0?`+${ly.da} words allocated at this step (bump allocator, never freed until inference reset)`:'in-place operation — no arena allocation at this step'}</div>`;
}

function swM(i){cm=i;cl=0;render();}
function swL(i){cl=i;render();}

document.getElementById('tbprev').addEventListener('click',()=>{if(cl>0){cl--;render();}});
document.getElementById('tbnext').addEventListener('click',()=>{if(cl<MODELS[cm].layers.length-1){cl++;render();}});
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowLeft'&&cl>0){cl--;render();}
  else if(e.key==='ArrowRight'&&cl<MODELS[cm].layers.length-1){cl++;render();}
});

render();
</script>
</body>
</html>
